name: Release (macOS signed + notarized)

# Builds a Developer ID-signed, notarized, stapled macOS release (dmg + zip)
# for both arm64 and x64, then uploads the artifacts to the GitHub Release.
#
# This mirrors the LOCAL signing path (electron-builder.signed.cjs). The .app is
# signed by electron-builder (deep, Developer ID, hardened runtime) and notarized +
# stapled by the afterSign hook scripts/notarize.js (with Error-65 staple-retry);
# the DMGs are rebuilt via create-dmg and notarized + stapled by
# scripts/afterAllArtifactBuild.cjs (electron-builder's own DMG creation corrupts
# the embedded app signature). electron-builder builds the zip target only.
# The only difference vs local is credential delivery: locally we use the
# `natively-notary` keychain profile; in CI we use an App Store Connect API key
# (APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER), the recommended
# non-interactive path. Both built-in notarize and the DMG hook read those env vars.
#
# ── REQUIRED REPOSITORY SECRETS ────────────────────────────────────────────
#   MACOS_CERT_P12_BASE64   base64 of the exported "Developer ID Application" .p12
#                           (export from Keychain Access; then `base64 -i cert.p12 | pbcopy`)
#   MACOS_CERT_PASSWORD     password set when exporting the .p12
#   KEYCHAIN_PASSWORD       any throwaway password for the temporary CI keychain
#   APPLE_API_KEY_P8_BASE64 base64 of the App Store Connect API key .p8 file
#   APPLE_API_KEY_ID        the key id (e.g. T9GPZ92M7K)
#   APPLE_API_ISSUER        the issuer UUID (App Store Connect → Users and Access → Integrations)
#
# Notes:
#   - We do NOT use the local `natively-notary` keychain profile in CI — that
#     profile only exists on the developer's machine. The api-key env vars
#     (APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER) are consumed by
#     electron-builder's built-in notarytool (app) and afterAllArtifactBuild.cjs (DMG).
#   - electron-builder imports the signing cert from CSC_LINK (the .p12) and
#     auto-discovers the Developer ID identity, so we do NOT set
#     NATIVELY_SIGN_IDENTITY here (the .signed.cjs config treats undefined as
#     "auto-discover").

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {} # manual trigger uses the branch/tag selected in the Actions UI

permissions:
  contents: write # needed to upload release assets

jobs:
  build-macos:
    runs-on: macos-14 # Apple Silicon runner; builds both arches via NATIVELY_BUILD_ALL_MAC_ARCHES
    timeout-minutes: 90
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Defaults to the triggering ref (tag on push, selected ref on dispatch).
          # No untrusted-input ref interpolation.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust (native module)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Import Developer ID signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer_id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/natively-signing.keychain-db"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # Allow codesign to use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Make the temp keychain the default search list (+ keep login keychain).
          security list-keychains -d user -s "$KEYCHAIN_PATH" "login.keychain-db"
          echo "Imported identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          # Export CSC_LINK for electron-builder (it can also read the keychain directly,
          # but pointing it at the .p12 is the most deterministic path).
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$MACOS_CERT_PASSWORD" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key for notarytool
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"
          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, staple
        env:
          # App Store Connect API-key strategy (consumed by notarize.js + afterAllArtifactBuild.cjs):
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # GH token for electron-builder publish (artifacts attach to the release on tag builds).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Explicit stages (NOT `npm run dist:signed`): the dist:signed chain re-runs
        # `npm run build` (rimraf dist dist-electron) which can race electron-builder's
        # native rebuild and ENOENT on dist-electron at package time. Building the stages
        # first, then invoking electron-builder directly, is the reliable path.
        run: |
          set -euo pipefail
          # create-dmg is required by afterAllArtifactBuild.cjs (DMG rebuild) — install FIRST.
          which create-dmg >/dev/null 2>&1 || brew install create-dmg
          npm run build
          npm run build:electron
          NATIVELY_BUILD_ALL_MAC_ARCHES=1 npm run build:native
          node scripts/ensure-sharp-mac-deps.js
          ./node_modules/.bin/electron-builder --mac --config electron-builder.signed.cjs --publish never

      - name: Verify signature + notarization (both arches + DMGs)
        run: |
          set -euo pipefail
          APPS=$(find release -maxdepth 2 -name 'Natively.app' -path '*mac*')
          if [ -z "$APPS" ]; then echo "No Natively.app found in release/"; exit 1; fi
          for APP in $APPS; do
            echo "::group::Verifying app: $APP"
            codesign -dv --verbose=4 "$APP" 2>&1 | sed -n '1,20p'
            codesign --verify --deep --strict --verbose=4 "$APP"
            spctl -a -vvv -t execute "$APP"          # expect: accepted / source=Notarized Developer ID
            xcrun stapler validate "$APP"
            # 2026-07-08: confirm the binary is NOT marked with a quarantine
            # xattr (e.g. com.apple.quarantine). The notarization + stapling
            # pipeline should clear this on signed apps, but a stale flag
            # would make the app refuse to launch on a fresh macOS profile
            # — exactly the "never opens again" failure mode we shipped to
            # production in the past. Treat as a hard release gate.
            if xattr -l "$APP" 2>/dev/null | grep -q 'com.apple.quarantine'; then
              echo "::error::Natively.app carries com.apple.quarantine — would refuse to launch on a fresh macOS profile. Re-run electron-builder to clean the build artifact."
              exit 1
            fi
            echo "::endgroup::"
          done
          # DMGs are signed + notarized + stapled by scripts/afterAllArtifactBuild.cjs.
          shopt -s nullglob
          DMGS=(release/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then echo "No DMGs found in release/"; exit 1; fi
          for DMG in "${DMGS[@]}"; do
            echo "::group::Verifying dmg: $DMG"
            xcrun stapler validate "$DMG"            # hard requirement
            spctl -a -vvv -t open --context context:primary-signature "$DMG" || true  # informational
            # 2026-07-08: same quarantine gate for the DMG.
            if xattr -l "$DMG" 2>/dev/null | grep -q 'com.apple.quarantine'; then
              echo "::error::$DMG carries com.apple.quarantine. The .dmg would not auto-mount cleanly on a fresh macOS profile. Re-run electron-builder."
              exit 1
            fi
            echo "::endgroup::"
          done

      # Required packaged local-fallback assets (ONNX/Transformers deps + bundled
      # MiniLM/MobileBERT models + local ONNX worker scripts). The packaged app
      # must work on a clean machine with no Ollama, no API keys, no internet.
      - name: Verify packaged local fallback assets (per-arch)
        run: |
          set -euo pipefail
          APPS=$(find release -maxdepth 2 -name 'Natively.app' -path '*mac*')
          if [ -z "$APPS" ]; then echo "No Natively.app found in release/"; exit 1; fi
          for APP in $APPS; do
            echo "::group::Verify packaged local assets: $APP"
            node scripts/verify-packaged-local-assets.mjs --app "$APP"
            echo "::endgroup::"
          done

      # Runtime gate: actually launch the packaged app with no Ollama and no
      # API keys and assert the local fallback preflight passes. This is the
      # only step that proves the packaged binary really works on a clean
      # machine — the static verifier above can pass even when the runtime
      # worker load path is broken. Uses arm64 to match the runner.
      - name: Packaged no-Ollama no-keys smoke (arm64)
        run: |
          set -euo pipefail
          APPS=$(find release -maxdepth 2 -name 'Natively.app' -path '*mac*')
          if [ -z "$APPS" ]; then echo "No Natively.app found in release/"; exit 1; fi
          APP=$(echo "$APPS" | tr ' ' '\n' | grep arm64 | head -n1)
          if [ -z "$APP" ]; then echo "No arm64 Natively.app found"; exit 1; fi
          echo "::group::Smoke: $APP"
          node scripts/smoke-packaged-local-fallback.mjs --app "$APP" --no-ollama --no-keys
          echo "::endgroup::"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: natively-macos-signed
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Natively $TAG"
          gh release upload "$TAG" release/*.dmg release/*.zip release/latest-mac.yml --clobber
